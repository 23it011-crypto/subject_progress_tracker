{% extends 'base.html' %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card glass-panel">
        <h2 class="card-title">Add New Subject</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" name="subject_name" required>
            </div>
            <div class="form-group">
                <label>Course Code</label>
                <input type="text" name="course_code" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Semester</label>
                    <input type="number" name="semester" min="1" max="8" required>
                </div>
                <div class="form-group">
                    <label>Total Units</label>
                    <input type="number" name="total_units" min="1" max="10" value="5" required>
                </div>
            </div>
            <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; border: 1px solid var(--card-border);">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Academic Year</label>
                <div style="display: flex; gap: 1rem;">
                    <label><input type="radio" name="year" value="1" required> 1st Year</label>
                    <label><input type="radio" name="year" value="2"> 2nd Year</label>
                    <label><input type="radio" name="year" value="3"> 3rd Year</label>
                    <label><input type="radio" name="year" value="4"> 4th Year</label>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" name="start_date">
                </div>
                <div class="form-group">
                    <label>End Date (Deadline)</label>
                    <input type="date" name="end_date">
                </div>
            </div>
            <div class="form-group">
                <label>Assign Tutor</label>
                <select name="assigned_teacher" required>
                    <option value="" disabled selected>Select a Teacher</option>
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}">{{ teacher.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Add Subject</button>
        </form>
    </div>
</div>
{% endblock %}
