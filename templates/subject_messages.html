{% extends 'base.html' %}
{% block content %}
<div class="glass-panel card fade-in">
    <h2 class="card-title">Messages: {{ subject.subject_name }}</h2>
    
    <div style="display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto; padding: 1rem; background: #f8f9fa;">
        {% for msg in chat_messages %}
        <div style="align-self: {% if msg.sender == user %}flex-end{% else %}flex-start{% endif %}; max-width: 70%; padding: 0.8rem; border-radius: 12px; background: {% if msg.sender == user %}#007bff; color: white;{% else %}white; border: 1px solid #ddd;{% endif %};">
            <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 0.4rem;">{{ msg.sender.username }} • {{ msg.created_at|date:"d M H:i" }}</div>
            <div>{{ msg.text }}</div>
        </div>
        {% empty %}
        <p style="text-align: center; opacity: 0.5;">No messages yet.</p>
        {% endfor %}
    </div>

    <form method="POST" style="margin-top: 2rem;">
        {% csrf_token %}
        <div class="form-group" style="display: flex; gap: 10px;">
            <textarea name="text" placeholder="Type your message..." required style="flex: 1; min-height: 40px;"></textarea>
            <button type="submit" class="btn btn-primary" style="padding: 0.6rem 2rem;">Send</button>
        </div>
    </form>
</div>
{% endblock %}
